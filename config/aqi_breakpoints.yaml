# ============================================================================
# CPCB National Air Quality Index (2014) sub-index breakpoints.
# Source: CPCB, "National Air Quality Index" (2014), Central Pollution Control
# Board, Govt. of India.
#
# Sub-index (piecewise-linear interpolation, same form as Wang 2023 Eq.4 /
# Lu 2011 Eq.1):
#     I_p = (I_hi - I_lo)/(BP_hi - BP_lo) * (C_p - BP_lo) + I_lo
# Overall AQI = max(sub-indices)  [CPCB; Wang 2023 Eq.5]
#   - requires >= 3 pollutants, of which PM2.5 OR PM10 is mandatory.
#
# Averaging windows:
#   PM2.5, PM10, NO2, SO2, NH3, Pb : 24-hour mean
#   CO, O3                         : 8-hour max (rolling)
#
# Concentration units: ug/m^3, EXCEPT CO in mg/m^3.
# Each row: [C_lo, C_hi, I_lo, I_hi]
# ============================================================================

categories:                 # AQI band -> (label, official CPCB hex colour)
  - { lo: 0,   hi: 50,  label: "Good",         color: "#009865" }
  - { lo: 51,  hi: 100, label: "Satisfactory", color: "#84CF33" }
  - { lo: 101, hi: 200, label: "Moderate",     color: "#FFFB26" }
  - { lo: 201, hi: 300, label: "Poor",         color: "#F2A93B" }
  - { lo: 301, hi: 400, label: "Very Poor",    color: "#EA3324" }
  - { lo: 401, hi: 500, label: "Severe",       color: "#9C2E2C" }

averaging:
  pm25: { hours: 24, agg: mean }
  pm10: { hours: 24, agg: mean }
  no2:  { hours: 24, agg: mean }
  so2:  { hours: 24, agg: mean }
  nh3:  { hours: 24, agg: mean }
  pb:   { hours: 24, agg: mean }
  co:   { hours: 8,  agg: max }
  o3:   { hours: 8,  agg: max }
  pb:   { hours: 24, agg: mean }

mandatory: [pm25, pm10]     # at least one must be present
min_pollutants: 3

breakpoints:
  pm25:   # ug/m^3, 24h
    - [0,   30,  0,   50]
    - [31,  60,  51,  100]
    - [61,  90,  101, 200]
    - [91,  120, 201, 300]
    - [121, 250, 301, 400]
    - [251, 500, 401, 500]
  pm10:   # ug/m^3, 24h
    - [0,   50,  0,   50]
    - [51,  100, 51,  100]
    - [101, 250, 101, 200]
    - [251, 350, 201, 300]
    - [351, 430, 301, 400]
    - [431, 600, 401, 500]
  no2:    # ug/m^3, 24h
    - [0,   40,  0,   50]
    - [41,  80,  51,  100]
    - [81,  180, 101, 200]
    - [181, 280, 201, 300]
    - [281, 400, 301, 400]
    - [401, 600, 401, 500]
  so2:    # ug/m^3, 24h
    - [0,   40,   0,   50]
    - [41,  80,   51,  100]
    - [81,  380,  101, 200]
    - [381, 800,  201, 300]
    - [801, 1600, 301, 400]
    - [1601, 2400, 401, 500]
  co:     # mg/m^3, 8h
    - [0.0,  1.0,  0,   50]
    - [1.1,  2.0,  51,  100]
    - [2.1,  10.0, 101, 200]
    - [10.1, 17.0, 201, 300]
    - [17.1, 34.0, 301, 400]
    - [34.1, 50.0, 401, 500]
  o3:     # ug/m^3, 8h
    - [0,   50,  0,   50]
    - [51,  100, 51,  100]
    - [101, 168, 101, 200]
    - [169, 208, 201, 300]
    - [209, 748, 301, 400]
    - [749, 1000, 401, 500]
  nh3:    # ug/m^3, 24h
    - [0,    200,  0,   50]
    - [201,  400,  51,  100]
    - [401,  800,  101, 200]
    - [801,  1200, 201, 300]
    - [1201, 1800, 301, 400]
    - [1801, 2400, 401, 500]
  pb:     # ug/m^3, 24h  (rarely measured by CAAQMS, but part of the CPCB scheme)
    - [0.0, 0.5, 0,   50]
    - [0.5, 1.0, 51,  100]
    - [1.1, 2.0, 101, 200]
    - [2.1, 3.0, 201, 300]
    - [3.1, 3.5, 301, 400]
    - [3.5, 5.0, 401, 500]
